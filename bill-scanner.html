<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>€cho - Philippine Peso Scanner</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;600;700;900&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Public Sans', sans-serif;
    }

    :root {
      --bg: #fcf9f2;
      --fg: #2a3439;
      --moss-green: #4b5d4e;
      --moss-green-dark: #3a483c;
      --moss-green-light: #6a826e;
      --accent: #2e8b57;
      --error: #d32f2f;
      --border: #e0dcd3;
      --radius: 0px;
      /* Neo-brutalist sharp edges */
    }

    body {
      background: var(--bg);
      color: var(--fg);
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      touch-action: manipulation;
    }

    #root {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .container {
      flex: 1;
      display: flex;
      flex-direction: column;
      position: relative;
      z-index: 2;
    }

    /* Header */
    header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      padding: 1.25rem 1.5rem;
      background: var(--bg);
      border-bottom: 2px solid var(--fg);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      font-weight: 900;
      font-size: 1.75rem;
      letter-spacing: -0.04em;
      color: var(--fg);
      display: flex;
      align-items: baseline;
      gap: 0;
    }

    .logo-euro {
      color: var(--moss-green);
      font-weight: 900;
      font-size: 1.85rem;
    }

    .logo-text {
      color: var(--fg);
      font-weight: 800;
    }

    .header-controls {
      display: flex;
      gap: 0.5rem;
    }

    .icon-btn {
      background: transparent;
      border: 2px solid var(--fg);
      padding: 0.5rem 0.75rem;
      font-size: 1rem;
      font-weight: 700;
      color: var(--fg);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.25rem;
      transition: background 0.1s;
    }

    .icon-btn:hover {
      background: var(--moss-green);
      color: white;
      border-color: var(--moss-green);
    }

    .icon-btn.active {
      background: var(--moss-green);
      color: white;
      border-color: var(--moss-green);
    }

    /* Main Screens */
    main {
      margin-top: 4.5rem;
      width: 100%;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .screen {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
    }

    /* Welcome Screen */
    .welcome-screen {
      padding: 2rem;
      text-align: center;
    }

    .welcome-title {
      font-size: 3rem;
      font-weight: 900;
      text-transform: uppercase;
      line-height: 1;
      margin-bottom: 1rem;
      color: var(--fg);
      letter-spacing: -0.05em;
    }

    .welcome-sub {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--fg);
      max-width: 300px;
      margin: 0 auto 2rem;
    }

    /* Full Width Bottom Button (Heritage Vision Style) */
    .bottom-action-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      background: var(--moss-green);
      padding: 1.5rem;
      display: flex;
      justify-content: center;
      z-index: 10;
    }

    .btn-massive {
      width: 100%;
      max-width: 500px;
      padding: 1.5rem;
      background: var(--moss-green);
      color: white;
      border: 2px solid white;
      font-size: 1.5rem;
      font-weight: 900;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.1s;
    }

    .btn-massive:active,
    .btn-massive:hover {
      background: var(--moss-green-dark);
    }

    .btn-massive.secondary {
      background: transparent;
      color: var(--fg);
      border: 2px solid var(--fg);
      margin-top: 1rem;
    }

    .btn-massive.secondary:hover {
      background: rgba(0, 0, 0, 0.05);
    }

    /* Camera Screen */
    .camera-screen {
      position: relative;
      height: 100vh;
      background: #000;
      justify-content: flex-start;
      margin-top: -4.5rem;
      /* overlay under header */
    }

    video {
      width: 100%;
      height: calc(100vh - 100px);
      object-fit: cover;
    }

    .camera-frame {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 80%;
      aspect-ratio: 1/1.5;
      border: 4px solid var(--moss-green);
      box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.5);
      pointer-events: none;
    }

    .camera-target {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 40px;
      height: 40px;
      border: 2px dashed rgba(255, 255, 255, 0.5);
    }

    .camera-status-bar {
      position: absolute;
      bottom: 0;
      width: 100%;
      background: var(--moss-green);
      color: white;
      text-align: center;
      padding: 2rem 1rem;
      font-size: 1.2rem;
      font-weight: 700;
      text-transform: uppercase;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }

    /* Result Screen */
    .result-screen {
      background: var(--bg);
      padding: 2rem;
      text-align: center;
      justify-content: flex-start;
      margin-top: 2rem;
    }

    .result-amount {
      font-size: 7rem;
      font-weight: 900;
      color: var(--moss-green);
      line-height: 1;
      margin-bottom: 0.5rem;
      letter-spacing: -0.05em;
    }

    .result-text {
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--fg);
      text-transform: uppercase;
      margin-bottom: 3rem;
    }

    .action-stack {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      width: 100%;
      max-width: 400px;
      margin: 0 auto;
    }

    .btn-block {
      width: 100%;
      padding: 1.25rem;
      font-size: 1.25rem;
      font-weight: 900;
      text-transform: uppercase;
      cursor: pointer;
      border: 2px solid var(--fg);
    }

    .btn-primary {
      background: var(--moss-green);
      color: white;
      border-color: var(--moss-green);
    }

    .btn-primary:hover {
      background: var(--moss-green-dark);
      border-color: var(--moss-green-dark);
    }

    .btn-outline {
      background: transparent;
      color: var(--fg);
    }

    .btn-outline:hover {
      background: rgba(0, 0, 0, 0.05);
    }

    /* History Side Panel */
    .history-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.4);
      z-index: 200;
    }

    .history-panel {
      position: fixed;
      top: 0;
      right: 0;
      bottom: 0;
      width: 100%;
      max-width: 400px;
      background: var(--bg);
      z-index: 201;
      display: flex;
      flex-direction: column;
      border-left: 2px solid var(--fg);
      transform: translateX(100%);
      transition: transform 0.3s ease;
    }

    .history-panel.open {
      transform: translateX(0);
    }

    .history-header {
      padding: 1.5rem;
      border-bottom: 2px solid var(--fg);
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--moss-green);
      color: white;
    }

    .history-title {
      font-size: 1.25rem;
      font-weight: 900;
      text-transform: uppercase;
    }

    .close-btn {
      background: transparent;
      border: 2px solid white;
      color: white;
      font-weight: 900;
      cursor: pointer;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .history-list {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .history-item {
      padding: 1rem;
      border: 2px solid var(--fg);
      background: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .h-item-val {
      font-weight: 900;
      font-size: 1.5rem;
      color: var(--moss-green);
    }

    .h-item-time {
      font-size: 0.8rem;
      color: var(--fg);
      font-weight: 600;
    }

    .history-footer {
      padding: 1.5rem;
      border-top: 2px solid var(--fg);
    }

    /* Audio Indicator */
    .mic-indicator {
      display: inline-block;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--error);
      margin-right: 0.5rem;
      animation: blink 2s infinite;
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.3;
      }
    }

    /* Helper Utilities */
    .hidden {
      display: none !important;
    }

    #canvas {
      display: none;
    }
  </style>
</head>

<body>
  <div id="root"></div>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useRef, useEffect, useCallback } = React;

    const HISTORY_KEY = 'billvoice_history';
    const numberWords = {
      20: "TWENTY PESOS",
      50: "FIFTY PESOS",
      100: "ONE HUNDRED PESOS",
      200: "TWO HUNDRED PESOS",
      500: "FIVE HUNDRED PESOS",
      1000: "ONE THOUSAND PESOS"
    };

    const loadHistory = () => {
      try {
        const data = localStorage.getItem(HISTORY_KEY);
        return data ? JSON.parse(data) : [];
      } catch { return []; }
    };

    function App() {
      const [state, setState] = useState('idle'); // idle, camera, processing, result, error
      const [result, setResult] = useState(null);
      const [errorMessage, setErrorMessage] = useState('');
      const [history, setHistory] = useState(loadHistory);
      const [showHistory, setShowHistory] = useState(false);
      const [voiceActive, setVoiceActive] = useState(false);

      const videoRef = useRef(null);
      const canvasRef = useRef(null);
      const streamRef = useRef(null);
      const recognitionRef = useRef(null);

      // --- Speech Recognition (Voice Commands) ---
      useEffect(() => {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
          console.warn("Speech Recognition not supported in this browser.");
          return;
        }

        const recognition = new SpeechRecognition();
        recognition.continuous = true;
        recognition.interimResults = false;
        recognition.lang = 'en-US';

        recognition.onresult = (event) => {
          const lastResultIndex = event.results.length - 1;
          const command = event.results[lastResultIndex][0].transcript.trim().toLowerCase();
          console.log("Voice Command Recognized: ", command);

          // Handle routing based on voice commands
          if (command.includes('scan') || command.includes('start')) {
            document.getElementById('action-scan')?.click();
          } else if (command.includes('capture') || command.includes('take photo')) {
            document.getElementById('action-capture')?.click();
          } else if (command.includes('cancel') || command.includes('stop')) {
            document.getElementById('action-cancel')?.click();
          } else if (command.includes('repeat') || command.includes('listen')) {
            document.getElementById('action-repeat')?.click();
          } else if (command.includes('history')) {
            document.getElementById('action-history')?.click();
          } else if (command.includes('close')) {
            document.getElementById('action-close')?.click();
          }
        };

        recognition.onerror = (event) => {
          console.error("Speech recognition error", event.error);
          if (event.error === 'not-allowed') {
            setVoiceActive(false);
          }
        };

        recognition.onend = () => {
          // Auto-restart if it was intentionally active
          if (voiceActive) {
            try { recognition.start(); } catch (e) { }
          }
        };

        recognitionRef.current = recognition;

        return () => {
          recognition.stop();
        };
      }, [voiceActive]);

      useEffect(() => {
        if (voiceActive && recognitionRef.current) {
          try { recognitionRef.current.start(); } catch (e) { }
        } else if (!voiceActive && recognitionRef.current) {
          recognitionRef.current.stop();
        }
      }, [voiceActive]);

      // TTS
      const speak = (text) => {
        if ('speechSynthesis' in window) {
          window.speechSynthesis.cancel();
          const utterance = new SpeechSynthesisUtterance(text);
          utterance.lang = 'en-US';
          window.speechSynthesis.speak(utterance);
        }
      };

      const vibrate = (pattern = 50) => navigator.vibrate && navigator.vibrate(pattern);

      useEffect(() => {
        speak('Welcome to Echo. Voice assistant is available. Toggle microphone menu to use commands like "Scan", "Capture", "Repeat", or "Cancel".');
      }, []);

      useEffect(() => {
        localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
      }, [history]);

      const stopCamera = () => {
        if (streamRef.current) {
          streamRef.current.getTracks().forEach(track => track.stop());
          streamRef.current = null;
        }
      };

      const startCamera = async () => {
        try {
          vibrate(50);
          setState('camera');
          speak('Camera open. Position bill in frame, then say Capture or tap the screen.');

          const stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: 'environment', width: 1280, height: 720 }
          });
          streamRef.current = stream;
          if (videoRef.current) {
            videoRef.current.srcObject = stream;
          }
        } catch (error) {
          alert('Camera permission denied.');
          setState('idle');
          speak('Camera permission denied.');
        }
      };

      const captureImage = async () => {
        if (state !== 'camera') return;
        vibrate([50, 100, 50]);
        setState('processing');
        speak('Processing...');

        const video = videoRef.current;
        const canvas = canvasRef.current;
        if (video && canvas) {
          canvas.width = video.videoWidth;
          canvas.height = video.videoHeight;
          canvas.getContext('2d').drawImage(video, 0, 0);
        }
        stopCamera();

        let imageDataBase64 = '';
        if (canvas) {
          const dataUrl = canvas.toDataURL('image/jpeg', 0.8);
          imageDataBase64 = dataUrl.split(',')[1];
        }

        try {
          const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=AIzaSyCkQEPdeS4CXF_Oic1nYrlt5p97UnQQCjc`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              contents: [{
                parts: [
                  { text: "Identify the denomination of this Philippine Peso bill. Return only the number. Valid numbers are 20, 50, 100, 200, 500, 1000. If you cannot confidently identify it, return 'unknown'." },
                  { inlineData: { mimeType: "image/jpeg", data: imageDataBase64 } }
                ]
              }]
            })
          });
          const data = await response.json();
          const textResponse = data.candidates[0].content.parts[0].text.trim().toLowerCase();

          let denom;
          if (textResponse.includes('1000')) denom = 1000;
          else if (textResponse.includes('500')) denom = 500;
          else if (textResponse.includes('200')) denom = 200;
          else if (textResponse.includes('100')) denom = 100;
          else if (textResponse.includes('50')) denom = 50;
          else if (textResponse.includes('20')) denom = 20;
          else throw new Error("Unidentified bill: " + textResponse);

          const res = { id: Date.now(), denomination: denom, timestamp: Date.now() };
          setResult(res);
          setHistory(prev => [res, ...prev]);
          setState('result');
          vibrate([100, 50, 100]);
          speak(`${denom} pesos.`);

        } catch (e) {
          console.error(e);
          setState('error');
          setErrorMessage('Could not identify the bill. Please try scanning again.');
          speak('Could not identify the bill. Please try scanning again.');
        }
      };

      const repeatResult = () => {
        vibrate(30);
        if (result) speak(`${result.denomination} pesos.`);
      };

      const resetApp = () => {
        vibrate(30);
        stopCamera();
        setState('idle');
        setResult(null);
        speak('Ready to scan. Say Scan to begin.');
      };

      const toggleHistory = () => setShowHistory(!showHistory);

      return (
        <>
          <header>
            <div className="logo">
              <span className="logo-euro">€</span>
              <span className="logo-text">cho</span>
            </div>
            <div className="header-controls">
              <button
                className={`icon-btn ${voiceActive ? 'active' : ''}`}
                onClick={() => setVoiceActive(!voiceActive)}
                title="Toggle Voice Commands"
              >
                {voiceActive ? <span className="mic-indicator"></span> : null}
                🎙️
              </button>
              <button
                className="icon-btn"
                onClick={toggleHistory}
                id="action-history"
                title="View History"
              >
                🕒
              </button>
              <a 
                href="https://github.com/DeghneG/echo-project-webapp" 
                target="_blank" 
                rel="noopener noreferrer"
                className="icon-btn"
                style={{textDecoration: 'none'}}
                title="View on GitHub"
              >
                <svg height="20" width="20" viewBox="0 0 16 16" fill="currentColor">
                  <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"></path>
                </svg>
              </a>
            </div>
          </header>

          <main>
            {state === 'idle' && (
              <div className="screen welcome-screen">
                <h1 className="welcome-title">Peso Scanner</h1>
                <p className="welcome-sub">Position your bill in front of the camera.</p>
                <div className="bottom-action-bar">
                  <button className="btn-massive" id="action-scan" onClick={startCamera}>
                    Start Scanning
                  </button>
                </div>
              </div>
            )}

            {state === 'camera' && (
              <div className="screen camera-screen" onClick={captureImage} id="action-capture">
                <video ref={videoRef} autoPlay playsInline muted></video>
                <div className="camera-frame">
                  <div className="camera-target"></div>
                </div>
                <div className="camera-status-bar">
                  SEARCHING FOR BILL...
                  <button className="icon-btn" style={{ borderColor: 'white', color: 'white' }} id="action-cancel" onClick={(e) => { e.stopPropagation(); resetApp(); }}>
                    X CANCEL
                  </button>
                </div>
                <canvas ref={canvasRef}></canvas>
              </div>
            )}

            {state === 'processing' && (
              <div className="screen">
                <h1 className="welcome-title">Analyzing...</h1>
              </div>
            )}

            {state === 'error' && (
              <div className="screen welcome-screen">
                <h1 className="welcome-title" style={{ color: 'var(--error)' }}>Error</h1>
                <p className="welcome-sub">{errorMessage}</p>
                <div className="bottom-action-bar">
                  <button className="btn-massive" onClick={resetApp}>
                    Try Again
                  </button>
                </div>
              </div>
            )}

            {state === 'result' && result && (
              <div className="screen result-screen">
                <div>
                  <h2 className="result-amount">₱{result.denomination}</h2>
                  <div className="result-text">{numberWords[result.denomination]}</div>
                </div>

                <div className="action-stack">
                  <button className="btn-block btn-outline" id="action-repeat" onClick={repeatResult}>
                    🔊 Repeat Audio
                  </button>
                  <button className="btn-block btn-primary" id="action-scan" onClick={startCamera}>
                    Scan Again
                  </button>
                  <button className="btn-block btn-outline" style={{ border: 'none' }} id="action-cancel" onClick={resetApp}>
                    Go to Home
                  </button>
                </div>
              </div>
            )}
          </main>

          {/* History Drawer */}
          <div className={`history-panel ${showHistory ? 'open' : ''}`}>
            <div className="history-header">
              <h3 className="history-title">Scan History</h3>
              <button className="close-btn" id="action-close" onClick={toggleHistory}>X</button>
            </div>
            <div className="history-list">
              {history.length === 0 ? <p style={{ padding: '2rem', textAlign: 'center', fontWeight: 'bold' }}>No scans yet.</p> :
                history.map(item => (
                  <div className="history-item" key={item.id}>
                    <div className="h-item-val">₱{item.denomination}</div>
                    <div className="h-item-time">{new Date(item.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}</div>
                  </div>
                ))
              }
            </div>
            {history.length > 0 && (
              <div className="history-footer">
                <button className="btn-block btn-outline" onClick={() => { setHistory([]); speak('History cleared'); }}>Clear History</button>
              </div>
            )}
          </div>
          {showHistory && <div className="history-overlay" onClick={toggleHistory}></div>}

        </>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>

</html>
